variables:
  catalog:
    description: Unity Catalog name for HL7 pipeline
    default: users
  schema:
    description: Schema name for HL7 pipeline tables
    default: ankur_nayyar
  source_volume:
    description: Volume name for landing HL7 files
    default: landing
  funke_wheel_name:
    description: Filename of the funke wheel package
    default: funke-0.1.0a1-py3-none-any.whl
  ml_spark_version:
    description: DBR 17.x ML for AutoML (07) and batch inference (08); bundled MLflow 3
    default: 17.3.x-cpu-ml-scala2.13
  ml_node_type:
    description: Driver and worker node type for ML training/inference job clusters
    default: i3.xlarge
  ml_aws_availability:
    description: AWS worker availability after first_on_demand nodes (SPOT_WITH_FALLBACK = spot with on-demand fallback)
    default: SPOT_WITH_FALLBACK
  ml_first_on_demand:
    description: First N nodes (including driver) on on-demand; remaining workers use ml_aws_availability
    default: 1
  ml_zone_id:
    description: AWS AZ for cluster placement (same region as workspace)
    default: us-west-2a
  # Lakeflow / Jobs serverless environment (see job.environments in bundle reference)
  serverless_env_version:
    description: Serverless environment version string for workflow notebook tasks
    default: "4"
  app_git_url:
    description: HTTPS clone URL for the repo that contains hl7-forecasting-app (Git-only Apps workspaces)
    default: https://github.com/anayyar82/hl7-streaming-pipeline.git
  app_git_branch:
    description: Branch Databricks Apps should deploy from
    default: main
  app_git_provider:
    description: Git provider (case-insensitive in API; use gitHub for github.com)
    default: gitHub
  hl7_app_service_principal_id:
    description: hl7app service_principal_client_id for Lakebase databricks_create_role (databricks apps get hl7app -o json)
    default: "d27fa0aa-3bf3-49c0-9fcc-160243c99035"
  lakebase_connect_user:
    description: Databricks user email for 11_lakebase_grants (Lakebase OAuth "connect as" user; required for serverless)
    default: ""
  # Used by resources/hl7_sql_alerts.yml (Databricks SQL alert v2 — must match a warehouse the deploy user can use)
  sql_warehouse_id:
    description: SQL warehouse ID for scheduled SQL alerts (same as Lakeview dashboards when possible)
    default: e9b34f7a2e4b0561
  hl7_insight_email:
    description: Recipient for the daily HL7 data insight SQL alert email
    default: ankur.nayyar@databricks.com
  # gold_message_metrics — flag stale when max(last_message_at) older than this (matches app SLO strip)
  hl7_freshness_stale_after_hours:
    description: Hours without HL7 on gold_message_metrics before the stale alert fires
    default: 36
  hl7_insight_secret_scope:
    description: Secret scope for SendGrid; leave empty for HTML-on-DBFS only (set to e.g. email-insight and add sendgrid_api_key to enable email)
    default: ""

resources:
  jobs:
    # Notebook tasks use serverless compute for workflows (no cluster / existing_cluster_id).
    # See https://docs.databricks.com/aws/en/dev-tools/bundles/resources#job
    hl7_lakebase_sync:
      name: "[${bundle.target}] HL7 Lakebase Sync"
      environments:
        - environment_key: default
          spec:
            environment_version: ${var.serverless_env_version}
      tasks:
        - task_key: setup_and_validate
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/09_lakebase_sync.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              project_id: ankurhlsproject
              sync_mode: SNAPSHOT

    hl7_lakebase_load:
      name: "[${bundle.target}] HL7 Lakebase Load"
      environments:
        - environment_key: default
          spec:
            environment_version: ${var.serverless_env_version}
      tasks:
        - task_key: load_gold_to_lakebase
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/10_lakebase_load.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              project_id: ankurhlsproject

    hl7_genie_uc_grants:
      name: "[${bundle.target}] HL7 Genie UC Grants (hl7app SP)"
      environments:
        - environment_key: default
          spec:
            environment_version: ${var.serverless_env_version}
      tasks:
        - task_key: apply_uc_grants
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/12_genie_uc_grants.py

    hl7_lakebase_app_grants:
      name: "[${bundle.target}] HL7 Lakebase App OAuth Grants"
      environments:
        - environment_key: default
          spec:
            environment_version: ${var.serverless_env_version}
      tasks:
        - task_key: lakebase_oauth_grants
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/11_lakebase_grants.py
            base_parameters:
              app_sp_client_id: ${var.hl7_app_service_principal_id}
              lakebase_connect_user: ${var.lakebase_connect_user}

    hl7_sample_data:
      name: "[${bundle.target}] HL7 Generate Sample Data"
      environments:
        - environment_key: default
          spec:
            environment_version: ${var.serverless_env_version}
      tasks:
        - task_key: generate_hl7_files
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/06_generate_sample_data.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume: ${var.source_volume}
              num_days: "60"
              num_patients: "150"
              clear_existing: "yes"

    # AutoML requires databricks.automl (DBR ML) — not available on serverless job environments.
    hl7_automl_training:
      name: "[${bundle.target}] HL7 AutoML Model Training"
      tasks:
        - task_key: train_models
          new_cluster:
            spark_version: ${var.ml_spark_version}
            driver_node_type_id: ${var.ml_node_type}
            node_type_id: ${var.ml_node_type}
            autoscale:
              min_workers: 1
              max_workers: 2
            aws_attributes:
              availability: ${var.ml_aws_availability}
              first_on_demand: ${var.ml_first_on_demand}
              zone_id: ${var.ml_zone_id}
            data_security_mode: SINGLE_USER
            custom_tags:
              hl7_job: automl_training
              hl7_compute: dbr17-ml-ephemeral
          notebook_task:
            notebook_path: ../notebooks/07_automl_training.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              experiment_prefix: hl7_forecasting
              timeout_minutes: "5"

    hl7_model_inference:
      name: "[${bundle.target}] HL7 Model Inference"
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: America/Los_Angeles
        pause_status: PAUSED
      environments:
        - environment_key: default
          spec:
            environment_version: ${var.serverless_env_version}
      tasks:
        - task_key: run_inference
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/08_model_inference.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

    # One-click stack: DLT refresh → existing inference job → existing Lakebase load job (sequential).
    # App: set HL7_JOB_REFRESH_WORKFLOW to this job id after bundle deploy; grant app SP Can Run.
    hl7_refresh_workflow:
      name: "[${bundle.target}] HL7 DLT → Inference → Lakebase"
      tasks:
        - task_key: dlt_refresh
          pipeline_task:
            pipeline_id: ${resources.pipelines.hl7_streaming_dlt.id}
            full_refresh: false
        - task_key: model_inference
          depends_on:
            - task_key: dlt_refresh
          run_job_task:
            job_id: ${resources.jobs.hl7_model_inference.id}
        - task_key: lakebase_load
          depends_on:
            - task_key: model_inference
          run_job_task:
            job_id: ${resources.jobs.hl7_lakebase_load.id}

    # Polished HTML + matplotlib charts; optional SendGrid. SQL alert `hl7_daily_data_insight_email` is PAUSED.
    hl7_daily_insight_html_email:
      name: "[${bundle.target}] HL7 Daily insight (HTML + charts email)"
      schedule:
        quartz_cron_expression: "0 10 7 * * ?"
        timezone_id: America/Los_Angeles
        pause_status: UNPAUSED
      environments:
        - environment_key: default
          spec:
            environment_version: ${var.serverless_env_version}
      tasks:
        - task_key: insight_email
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/14_daily_insight_html_email.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              recipient: ${var.hl7_insight_email}
              secret_scope: ${var.hl7_insight_secret_scope}

  dashboards:
    hl7_ed_icu_dashboard:
      display_name: "[${bundle.target}] HL7 ED & ICU Operations"
      file_path: ../dashboards/hl7_ed_icu_operations.lvdash.json
      warehouse_id: e9b34f7a2e4b0561
      embed_credentials: true

    hl7_ed_icu_dashboard_main:
      display_name: "[${bundle.target}] HL7 ED & ICU"
      file_path: ../dashboards/hl7_ed_icu.lvdash.json
      warehouse_id: e9b34f7a2e4b0561
      embed_credentials: true

    hl7_patient_clinical_dashboard:
      display_name: "[${bundle.target}] HL7 Patient & Clinical Analytics"
      file_path: ../dashboards/hl7_patient_clinical_analytics.lvdash.json
      warehouse_id: e9b34f7a2e4b0561
      embed_credentials: true

  apps:
    hl7app:
      name: hl7app
      description: "HL7 ED/ICU real-time operations and forecasting dashboard"
      # Git-only workspaces reject workspace path deploys; app code is pulled from this repo path.
      git_repository:
        provider: ${var.app_git_provider}
        url: ${var.app_git_url}
      git_source:
        branch: ${var.app_git_branch}
        source_code_path: hl7-forecasting-app
      # Runtime override: always match the bundle DLT in this workspace (wins over app.yaml in Git).
      config:
        env:
          - name: HL7_PIPELINE_ID
            value: ${resources.pipelines.hl7_streaming_dlt.id}
      user_api_scopes:
        - sql
      permissions:
        - level: CAN_USE
          group_name: users

  pipelines:
    # Serverless Lakeflow Pipelines — no `clusters` block; see serverless DLT docs.
    hl7_streaming_dlt:
      name: "[${bundle.target}] HL7 Streaming Pipeline"
      catalog: ${var.catalog}
      target: ${var.schema}
      development: true
      channel: CURRENT
      photon: true
      serverless: true
      edition: ADVANCED
      continuous: false
      configuration:
        hl7.catalog: ${var.catalog}
        hl7.schema: ${var.schema}
        hl7.source_volume: ${var.source_volume}
        hl7.bundle_files_path: ${workspace.root_path}/files
        hl7.funke_wheel_name: ${var.funke_wheel_name}
      libraries:
        - notebook:
            path: ../notebooks/01_bronze.py
        - notebook:
            path: ../notebooks/02_silver.py
        - notebook:
            path: ../notebooks/03_gold.py
        - notebook:
            path: ../notebooks/04_reports.py
        - notebook:
            path: ../notebooks/05_forecasting.py
